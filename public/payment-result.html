<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thanh toán - FootField</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #16a34a; --red: #ef4444; --text: #0f172a; --text2: #64748b;
            --font: 'Barlow', sans-serif;
        }
        body {
            font-family: var(--font);
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--text2); font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: var(--green);
            color: #fff;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .error-code { font-family: monospace; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card" id="result-card">
        <div id="loading">Đang xử lý kết quả...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const bookingId = params.get('bookingId');
        const code = params.get('code');
        const card = document.getElementById('result-card');

        if (status === 'success') {
            card.innerHTML = `
                <div class="icon">✅</div>
                <h1 style="color:var(--green)">Thanh toán thành công!</h1>
                <p>Đơn hàng <strong>${bookingId || ''}</strong> đã được thanh toán thành công. Cảm ơn bạn đã sử dụng dịch vụ.</p>
                <a href="/" class="btn">Quay lại Dashboard</a>
            `;
        } else {
            let msg = "Có lỗi xảy ra trong quá trình xử lý thanh toán.";
            if (status === 'invalid_signature') msg = "Chữ ký bảo mật không hợp lệ.";
            if (code) msg += ` (Mã lỗi: <span class="error-code">${code}</span>)`;

            card.innerHTML = `
                <div class="icon">❌</div>
                <h1 style="color:var(--red)">Thanh toán thất bại</h1>
                <p>${msg}</p>
                <a href="/" class="btn" style="background:var(--text2)">Quay lại Dashboard</a>
            `;
        }

        // Tự động quay lại sau 5 giây
        setTimeout(() => {
            window.location.href = '/';
        }, 5000);
    </script>
</body>
</html>
